name: Package Skill

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skill
        run: python scripts/validate_skill.py revel-wayfinding

      - name: Package .skill file
        run: python scripts/package_skill.py revel-wayfinding dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: revel-wayfinding-skill
          path: dist/*.skill

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest dist/*.skill \
            --title "Latest Build" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --prerelease
